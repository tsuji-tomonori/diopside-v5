AWSTemplateFormatVersion: "2010-09-09"
Description: diopside low-cost serverless stack

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
  AdminToken:
    Type: String
    NoEcho: true
    MinLength: 8
  AdminCsrfToken:
    Type: String
    NoEcho: true
    MinLength: 8
  LambdaArtifactBucket:
    Type: String
    Description: S3 bucket containing Lambda zip artifacts.
  ApiCodeS3Key:
    Type: String
    Default: api.zip
  StaticExporterCodeS3Key:
    Type: String
    Default: static-exporter.zip
  YouTubeApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: YouTube Data API key passed only to the worker Lambda.

Resources:
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  PublicDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-public-exports
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: "diopside-${EnvName}-s3-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ApiFunctionUrlOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: "diopside-${EnvName}-lambda-url-oac"
        OriginAccessControlOriginType: lambda
        SigningBehavior: always
        SigningProtocol: sigv4

  ApiNoStoreCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name:
          Fn::Sub: "diopside-${EnvName}-api-no-store"
        DefaultTTL: 0
        MaxTTL: 0
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: all
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Authorization
              - X-CSRF-Token
              - X-Idempotency-Key
          QueryStringsConfig:
            QueryStringBehavior: all

  ManifestShortCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name:
          Fn::Sub: "diopside-${EnvName}-manifest-short"
        DefaultTTL: 60
        MaxTTL: 300
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  ImmutableCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name:
          Fn::Sub: "diopside-${EnvName}-immutable"
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name:
        Fn::Sub: "diopside-${EnvName}-spa-rewrite"
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri === "/" || (!request.uri.includes(".") && !request.uri.startsWith("/api/") && !request.uri.startsWith("/data/"))) {
            request.uri = "/index.html";
          }
          return request;
        }
      FunctionConfig:
        Comment: Rewrite SPA routes to index.html
        Runtime: cloudfront-js-2.0

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: WebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadWeb
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource:
              Fn::Sub: "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn:
                  Fn::Sub: "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  PublicDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: PublicDataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadPublicData
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource:
              Fn::Sub: "${PublicDataBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn:
                  Fn::Sub: "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: raw-metadata-transition
            Status: Enabled
            Prefix: youtube/raw/metadata/
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 180
            ExpirationInDays: 365
          - Id: failed-debug-expire
            Status: Enabled
            Prefix: failed/
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: by_public_date
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: by_tag
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: by_work_queue
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  MetadataQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt: [MetadataDlq, Arn]
        maxReceiveCount: 3
  MetadataDlq:
    Type: AWS::SQS::Queue

  ChatQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt: [ChatDlq, Arn]
        maxReceiveCount: 3
  ChatDlq:
    Type: AWS::SQS::Queue

  NormalizeQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt: [NormalizeDlq, Arn]
        maxReceiveCount: 3
  NormalizeDlq:
    Type: AWS::SQS::Queue

  AggregateQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt: [AggregateDlq, Arn]
        maxReceiveCount: 3
  AggregateDlq:
    Type: AWS::SQS::Queue

  StaticExportQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt: [StaticExportDlq, Arn]
        maxReceiveCount: 3
  StaticExportDlq:
    Type: AWS::SQS::Queue

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: diopside-api-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - Fn::GetAtt: [MetadataQueue, Arn]
                  - Fn::GetAtt: [ChatQueue, Arn]
                  - Fn::GetAtt: [NormalizeQueue, Arn]
                  - Fn::GetAtt: [AggregateQueue, Arn]
                  - Fn::GetAtt: [StaticExportQueue, Arn]
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - Fn::Sub: "${PublicDataBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - Fn::GetAtt: [AppTable, Arn]
                  - Fn::Sub: "${AppTable.Arn}/index/*"

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: diopside_api.handler.lambda_handler
      Role:
        Fn::GetAtt: [ApiRole, Arn]
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket:
          Ref: LambdaArtifactBucket
        S3Key:
          Ref: ApiCodeS3Key
      Environment:
        Variables:
          DIOPSIDE_VERSION:
            Ref: EnvName
          DIOPSIDE_TABLE_NAME:
            Ref: AppTable
          DIOPSIDE_ADMIN_TOKEN:
            Ref: AdminToken
          DIOPSIDE_ADMIN_CSRF_TOKEN:
            Ref: AdminCsrfToken
          DIOPSIDE_METADATA_QUEUE_URL:
            Ref: MetadataQueue
          DIOPSIDE_CHAT_QUEUE_URL:
            Ref: ChatQueue
          DIOPSIDE_NORMALIZE_QUEUE_URL:
            Ref: NormalizeQueue
          DIOPSIDE_AGGREGATE_QUEUE_URL:
            Ref: AggregateQueue
          DIOPSIDE_STATIC_EXPORT_QUEUE_URL:
            Ref: StaticExportQueue
          DIOPSIDE_PUBLIC_DATA_BUCKET:
            Ref: PublicDataBucket
          DIOPSIDE_PUBLIC_DATA_PREFIX: data

  ApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM
      TargetFunctionArn:
        Ref: ApiFunction

  ApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName:
        Ref: ApiFunction
      Principal: cloudfront.amazonaws.com
      FunctionUrlAuthType: AWS_IAM
      InvokedViaFunctionUrl: true
      SourceArn:
        Fn::Sub: "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        Origins:
          - Id: web-s3
            DomainName:
              Fn::GetAtt: [WebBucket, RegionalDomainName]
            OriginAccessControlId:
              Ref: CloudFrontOac
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: public-data-s3
            DomainName:
              Fn::GetAtt: [PublicDataBucket, RegionalDomainName]
            OriginAccessControlId:
              Ref: CloudFrontOac
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: api-function-url
            DomainName:
              Fn::Select:
                - 2
                - Fn::Split:
                    - "/"
                    - Fn::GetAtt: [ApiFunctionUrl, FunctionUrl]
            OriginAccessControlId:
              Ref: ApiFunctionUrlOac
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
        DefaultCacheBehavior:
          TargetOriginId: web-s3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId:
            Ref: ImmutableCachePolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN:
                Fn::GetAtt: [SpaRewriteFunction, FunctionARN]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: api-function-url
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId:
              Ref: ApiNoStoreCachePolicy
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          - PathPattern: /data/latest-manifest.json
            TargetOriginId: public-data-s3
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId:
              Ref: ManifestShortCachePolicy
          - PathPattern: /data/v/*
            TargetOriginId: public-data-s3
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId:
              Ref: ImmutableCachePolicy
          - PathPattern: /assets/*
            TargetOriginId: web-s3
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId:
              Ref: ImmutableCachePolicy

  StaticExporterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: diopside-static-exporter-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - s3:PutObject
                  - s3:GetObject
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - Fn::GetAtt: [AppTable, Arn]
                  - Fn::Sub: "${AppTable.Arn}/index/*"
                  - Fn::Sub: "${PublicDataBucket.Arn}/*"
                  - Fn::Sub: "${RawBucket.Arn}/*"
                  - Fn::Sub: "${ProcessedBucket.Arn}/*"
                  - Fn::GetAtt: [MetadataQueue, Arn]
                  - Fn::GetAtt: [ChatQueue, Arn]
                  - Fn::GetAtt: [NormalizeQueue, Arn]
                  - Fn::GetAtt: [AggregateQueue, Arn]
                  - Fn::GetAtt: [StaticExportQueue, Arn]

  StaticExporterFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: static_exporter.handler.lambda_handler
      Role:
        Fn::GetAtt: [StaticExporterRole, Arn]
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket:
          Ref: LambdaArtifactBucket
        S3Key:
          Ref: StaticExporterCodeS3Key
      Environment:
        Variables:
          DIOPSIDE_TABLE_NAME:
            Ref: AppTable
          DIOPSIDE_PUBLIC_DATA_BUCKET:
            Ref: PublicDataBucket
          DIOPSIDE_PUBLIC_DATA_PREFIX: data

  WorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: static_exporter.pipeline.lambda_handler
      Role:
        Fn::GetAtt: [StaticExporterRole, Arn]
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket:
          Ref: LambdaArtifactBucket
        S3Key:
          Ref: StaticExporterCodeS3Key
      Environment:
        Variables:
          DIOPSIDE_TABLE_NAME:
            Ref: AppTable
          DIOPSIDE_RAW_BUCKET:
            Ref: RawBucket
          DIOPSIDE_PROCESSED_BUCKET:
            Ref: ProcessedBucket
          DIOPSIDE_PUBLIC_DATA_BUCKET:
            Ref: PublicDataBucket
          DIOPSIDE_METADATA_QUEUE_URL:
            Ref: MetadataQueue
          DIOPSIDE_CHAT_QUEUE_URL:
            Ref: ChatQueue
          DIOPSIDE_NORMALIZE_QUEUE_URL:
            Ref: NormalizeQueue
          DIOPSIDE_AGGREGATE_QUEUE_URL:
            Ref: AggregateQueue
          DIOPSIDE_STATIC_EXPORT_QUEUE_URL:
            Ref: StaticExportQueue
          DIOPSIDE_YOUTUBE_API_KEY:
            Ref: YouTubeApiKey

  MetadataQueueMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn:
        Fn::GetAtt: [MetadataQueue, Arn]
      FunctionName:
        Ref: WorkerFunction
      BatchSize: 1
  ChatQueueMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn:
        Fn::GetAtt: [ChatQueue, Arn]
      FunctionName:
        Ref: WorkerFunction
      BatchSize: 1
  NormalizeQueueMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn:
        Fn::GetAtt: [NormalizeQueue, Arn]
      FunctionName:
        Ref: WorkerFunction
      BatchSize: 1
  AggregateQueueMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn:
        Fn::GetAtt: [AggregateQueue, Arn]
      FunctionName:
        Ref: WorkerFunction
      BatchSize: 1
  StaticExportQueueMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn:
        Fn::GetAtt: [StaticExportQueue, Arn]
      FunctionName:
        Ref: StaticExporterFunction
      BatchSize: 1

Outputs:
  CloudFrontDomainName:
    Value:
      Fn::GetAtt: [CloudFrontDistribution, DomainName]
  ApiEndpoint:
    Value:
      Fn::Sub: "https://${CloudFrontDistribution.DomainName}/api"
  ApiFunctionUrlOrigin:
    Description: Internal Lambda Function URL origin protected by AWS_IAM and CloudFront OAC. Use ApiEndpoint for clients.
    Value:
      Fn::GetAtt: [ApiFunctionUrl, FunctionUrl]
  WebBucketName:
    Value:
      Ref: WebBucket
  PublicDataBucketName:
    Value:
      Ref: PublicDataBucket
  AppTableName:
    Value:
      Ref: AppTable
  StaticExporterFunctionName:
    Value:
      Ref: StaticExporterFunction
  MetadataQueueUrl:
    Value:
      Ref: MetadataQueue
  ChatQueueUrl:
    Value:
      Ref: ChatQueue
  NormalizeQueueUrl:
    Value:
      Ref: NormalizeQueue
  AggregateQueueUrl:
    Value:
      Ref: AggregateQueue
  StaticExportQueueUrl:
    Value:
      Ref: StaticExportQueue
