<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>diopside</title>
    <meta name="description" content="白雪巴 YouTube 公開アーカイブ検索">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">YouTube archive</p>
        <h1>diopside</h1>
      </div>
      <a class="health-link" href="/api/health">API</a>
    </header>
    <main>
      <section class="search-band" aria-label="検索">
        <input id="searchInput" type="search" placeholder="タイトル・タグで検索" autocomplete="off">
        <div id="tagFilters" class="chips" aria-label="タグ"></div>
      </section>
      <section class="content-grid">
        <div>
          <div class="section-title">
            <h2>最新アーカイブ</h2>
            <span id="resultCount"></span>
          </div>
          <div id="videoList" class="video-list"></div>
        </div>
        <aside class="detail-pane" aria-live="polite">
          <h2>詳細</h2>
          <div id="videoDetail" class="detail-empty">動画を選択してください。</div>
        </aside>
      </section>
    </main>
    <nav class="bottom-nav" aria-label="主要操作">
      <button type="button" data-action="latest">最新</button>
      <button type="button" data-action="random">ランダム</button>
      <button type="button" data-action="clear">解除</button>
    </nav>
    <script type="module" src="/app.js"></script>
  </body>
</html>
