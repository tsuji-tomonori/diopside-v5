<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>diopside</title>
    <meta name="description" content="白雪巴 YouTube 公開アーカイブ検索">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">YouTube archive</p>
        <h1>diopside</h1>
      </div>
      <a class="health-link" href="/api/health">API</a>
    </header>
    <main>
      <section class="search-hub" aria-labelledby="searchHubTitle">
        <div class="search-copy">
          <p class="eyebrow">Archive search</p>
          <h2 id="searchHubTitle">白雪巴アーカイブを探す</h2>
          <p>タイトル、タグ、公開時刻から公開アーカイブをすばやく絞り込めます。</p>
        </div>
        <div class="search-box">
          <label for="searchInput">検索</label>
          <input id="searchInput" type="search" placeholder="タイトル・タグで検索" autocomplete="off">
        </div>
        <div class="hub-actions">
          <div>
            <div class="chip-head">
              <h3>quick chips</h3>
            </div>
            <div id="quickChips" class="chips quick-chips" aria-label="quick chips"></div>
          </div>
          <div>
            <div class="chip-head">
              <h3>最近検索</h3>
            </div>
            <div id="recentSearches" class="chips compact" aria-label="最近の検索"></div>
          </div>
        </div>
      </section>
      <section class="tag-nav" aria-labelledby="tagNavTitle">
        <div class="section-title">
          <h2 id="tagNavTitle">タグから探す</h2>
          <button type="button" id="clearTagButton" aria-label="タグ選択を解除">タグ解除</button>
        </div>
        <div id="tagFilters" class="chips tag-chips" aria-label="タグ"></div>
      </section>
      <section class="saved-nav" aria-labelledby="savedNavTitle">
        <div class="section-title">
          <h2 id="savedNavTitle">保存したアーカイブ</h2>
        </div>
        <div class="saved-grid">
          <section aria-labelledby="favoritesTitle">
            <h3 id="favoritesTitle">お気に入り</h3>
            <div id="favoriteVideos" class="saved-list"></div>
          </section>
          <section aria-labelledby="historyTitle">
            <h3 id="historyTitle">閲覧履歴</h3>
            <div id="historyVideos" class="saved-list"></div>
          </section>
        </div>
      </section>
      <section class="content-grid">
        <div>
          <div class="section-title">
            <h2>最新アーカイブ</h2>
            <span id="resultCount"></span>
          </div>
          <div id="videoList" class="video-list"></div>
        </div>
        <aside class="detail-pane" aria-live="polite">
          <h2>詳細</h2>
          <div id="videoDetail" class="detail-empty">動画を選択してください。</div>
        </aside>
      </section>
    </main>
    <nav class="bottom-nav" aria-label="主要操作">
      <button type="button" data-action="latest" aria-label="最新アーカイブを表示">最新</button>
      <button type="button" data-action="filter" aria-label="絞り込みを開く">絞込</button>
      <button type="button" data-action="clear" aria-label="検索と絞り込みを解除">解除</button>
      <button type="button" data-action="admin" aria-label="管理パネルを開く">管理</button>
    </nav>
    <dialog id="filterSheet" class="bottom-sheet" aria-labelledby="filterSheetTitle">
      <form id="filterForm" method="dialog">
        <div class="sheet-head">
          <h2 id="filterSheetTitle">絞り込み</h2>
          <button type="submit" aria-label="閉じる">閉じる</button>
        </div>
        <label>タグ
          <select name="tag" id="filterTagSelect">
            <option value="">すべて</option>
          </select>
        </label>
        <label>年 <input name="year" inputmode="numeric" placeholder="2026"></label>
        <label>長さ
          <select name="duration">
            <option value="">すべて</option>
            <option value="short">30分未満</option>
            <option value="medium">30分以上2時間未満</option>
            <option value="long">2時間以上</option>
          </select>
        </label>
        <label>並び順
          <select name="sort">
            <option value="published_desc">公開日が新しい</option>
            <option value="duration_desc">長い順</option>
          </select>
        </label>
        <label>wordcloud
          <select name="wordcloud">
            <option value="">すべて</option>
            <option value="yes">あり</option>
            <option value="no">なし</option>
          </select>
        </label>
        <label>timestamp
          <select name="timestamp">
            <option value="">すべて</option>
            <option value="yes">あり</option>
            <option value="no">なし</option>
          </select>
        </label>
        <div class="sheet-actions">
          <button type="button" id="clearFilterButton" aria-label="絞り込み条件を解除">条件を解除</button>
          <button type="submit" aria-label="絞り込みを適用して閉じる">適用して閉じる</button>
        </div>
      </form>
    </dialog>
    <dialog id="adminPanel" class="bottom-sheet" aria-labelledby="adminPanelTitle">
      <div class="admin-panel-content">
        <div class="sheet-head">
          <h2 id="adminPanelTitle">管理</h2>
          <button type="button" onclick="document.querySelector('#adminPanel').close()" aria-label="閉じる">閉じる</button>
        </div>
        <form id="adminJobForm">
          <h3>job</h3>
          <label>Passphrase <input name="passphrase" type="password" autocomplete="current-password"></label>
          <label>Job
            <select name="jobType">
              <option value="metadata-sync">metadata-sync</option>
              <option value="live-status-scan">live-status-scan</option>
              <option value="chat-collect">chat-collect</option>
              <option value="chat-normalize">chat-normalize</option>
              <option value="rebuild-artifacts">rebuild-artifacts</option>
              <option value="static-export">static-export</option>
            </select>
          </label>
          <label>video_id <input name="videoId" autocomplete="off"></label>
          <button type="submit" id="startJobButton" aria-label="管理 job を起動">起動</button>
          <div class="admin-actions">
            <button type="button" id="loadJobsButton" aria-label="job 一覧を読み込む">job一覧</button>
            <button type="button" id="loadQuotaButton" aria-label="quota usage を読み込む">quota</button>
          </div>
          <label>job_id <input name="jobId" id="adminJobId" autocomplete="off"></label>
          <button type="button" id="loadJobDetailButton" aria-label="job 詳細を読み込む">job詳細</button>
          <p id="adminResult" class="admin-result" aria-live="polite"></p>
        </form>
        <form id="adminChannelForm">
          <h3>チャンネル設定</h3>
          <div class="admin-actions">
            <button type="button" id="loadChannelsButton" aria-label="チャンネル一覧を読み込む">チャンネル一覧</button>
          </div>
          <label>channel_id <input name="channelId" autocomplete="off" required></label>
          <label>uploads_playlist_id <input name="uploadsPlaylistId" autocomplete="off"></label>
          <label>display_name <input name="displayName" autocomplete="off"></label>
          <label>metadata interval minutes <input name="metadataIntervalMinutes" type="number" min="1" max="1440" step="1" value="720"></label>
          <label>live scan interval minutes <input name="liveScanIntervalMinutes" type="number" min="1" max="1440" step="1" value="30"></label>
          <label class="checkbox-row"><input name="enabled" type="checkbox" checked> 取得有効</label>
          <label class="checkbox-row"><input name="notificationEnabled" type="checkbox"> 通知候補生成</label>
          <button type="submit" aria-label="チャンネル設定を保存">チャンネル保存</button>
          <div id="adminChannelList" class="admin-data" aria-live="polite"></div>
        </form>
        <form id="adminTagForm">
          <h3>タグ補正</h3>
          <label>video_id <input name="tagVideoId" autocomplete="off" required></label>
          <label>mode
            <select name="tagMode">
              <option value="add-remove">追加・削除</option>
              <option value="replace">置換</option>
            </select>
          </label>
          <label>add_tags <input name="addTags" autocomplete="off" placeholder="タグをカンマ区切りで入力"></label>
          <label>remove_tags <input name="removeTags" autocomplete="off" placeholder="タグをカンマ区切りで入力"></label>
          <label>replace_tags <input name="replaceTags" autocomplete="off" placeholder="タグをカンマ区切りで入力"></label>
          <button type="submit" aria-label="動画タグを保存">タグ保存</button>
          <div id="adminTagResult" class="admin-data" aria-live="polite"></div>
        </form>
        <div id="adminData" class="admin-data" aria-live="polite"></div>
      </div>
    </dialog>
    <script type="module" src="/app.js"></script>
  </body>
</html>
